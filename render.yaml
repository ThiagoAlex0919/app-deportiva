# Blueprint de Render — backend NestJS + PostgreSQL
# Deploy: render.com → New → Blueprint → conectar este repo.
# El seed es idempotente (upserts), por lo que puede correr en cada arranque.

databases:
  - name: app-deportiva-db
    plan: free
    databaseName: app_deportiva
    user: app_deportiva

services:
  - type: web
    name: app-deportiva-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    # ARRANQUE OPTIMIZADO (medido en producción):
    #  - db push sin cambios: ~2s → se queda (aplica cambios de schema solos).
    #  - seed: ~40s por arranque (ts-node + upserts) → CONDICIONAL: solo corre
    #    con SEED_ON_BOOT=true. Ponerla en true (Environment) cuando cambie
    #    prisma/seed.ts, dejar que arranque una vez, y volverla a false.
    startCommand: npx prisma db push --accept-data-loss && (test "$SEED_ON_BOOT" != "true" || npm run seed) && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: app-deportiva-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://app-deportiva-delta.vercel.app,*.vercel.app,http://localhost:3001
      # Secreto de firma de los access tokens (07_modulo_users_jwt.md).
      # Render genera un valor aleatorio en la creación y lo persiste.
      - key: JWT_SECRET
        generateValue: true
      # API key del backoffice (doc 10): protege POST /admin/events/:id/finish.
      # Leerla en el dashboard de Render (Environment) para usarla con curl.
      - key: ADMIN_API_KEY
        generateValue: true
      # Seed en el arranque: solo activarlo cuando cambie prisma/seed.ts.
      - key: SEED_ON_BOOT
        value: "false"
